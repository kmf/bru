      fgColor: "#ad8900"
      bgColor: "#faf3e0"
      highlightColor: "#0072d4"
      counterColor: "#8762c6"
      filterColor: "#009c8f"
  views:
    table:
      fgColor: "#3a2f22"
      bgColor: "#faf3e0"
      cursorFgColor: "#faf3e0"
      cursorBgColor: "#ad8900"
      markColor: "#009c8f"
      header:
        fgColor: "#ad8900"
        bgColor: "#faf3e0"
        sorterColor: "#0072d4"
    yaml:
      keyColor: "#0072d4"
      colonColor: "#8a7f6f"
      valueColor: "#489100"
    logs:
      fgColor: "#3a2f22"
      bgColor: "#faf3e0"
      indicator:
        fgColor: "#ad8900"
        bgColor: "#faf3e0"
        toggleOnColor: "#489100"
        toggleOffColor: "#8a7f6f"
